version: "3.9"

services:
  scoring:
    build:
      context: .
      dockerfile: services/scoring_service/Dockerfile
    container_name: tradingdevops-scoring-dev
    environment:
      SCORING_SERVICE_HOST: 0.0.0.0
      SCORING_SERVICE_PORT: 8000
      SCORING_OUTPUT_DIR: /app/outputs
      SCORING_WRITE_OUTPUTS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./inputs:/app/inputs:ro
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./failed:/app/failed
      - ./stocks.txt:/app/stocks.txt:ro
    restart: unless-stopped

  batch:
    build:
      context: .
      dockerfile: services/batch_service/Dockerfile
    container_name: tradingdevops-batch-dev
    environment:
      BATCH_SERVICE_HOST: 0.0.0.0
      BATCH_SERVICE_PORT: 8001
      BATCH_OUTPUT_DIR: /app/outputs
      BATCH_WRITE_OUTPUTS: "true"
      BATCH_MAX_WORKERS: "4"
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
      - ./inputs:/app/inputs:ro
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./failed:/app/failed
      - ./stocks.txt:/app/stocks.txt:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: services/frontend_service/Dockerfile
    container_name: tradingdevops-frontend-dev
    environment:
      FRONTEND_SERVICE_HOST: 0.0.0.0
      FRONTEND_SERVICE_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

