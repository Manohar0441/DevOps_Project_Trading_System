          "targets": [{ "expr": "rate(notifications_dispatched_total[5m])", "legendFormat": "{{channel}} ({{status}})", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 42, "title": "SQS Messages Consumed", "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 76 },
          "targets": [{ "expr": "rate(sqs_messages_consumed_total[5m])", "legendFormat": "{{queue}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 43, "title": "SQS Messages Failed", "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 76 },
          "targets": [{ "expr": "rate(sqs_messages_failed_total[5m])", "legendFormat": "{{queue}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.01 }] } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 44, "type": "row", "title": "System Resources",
          "collapsed": false, "panels": [],
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 84 }
        },
        {
          "id": 45, "title": "Resident Memory by Pod", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 85 },
          "targets": [{ "expr": "process_resident_memory_bytes", "legendFormat": "{{instance}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 46, "title": "CPU Usage by Pod (cores)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 85 },
          "targets": [{ "expr": "rate(process_cpu_seconds_total[5m])", "legendFormat": "{{instance}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 47, "title": "Open File Descriptors by Pod", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 93 },
          "targets": [{ "expr": "process_open_fds", "legendFormat": "{{instance}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 100 }, { "color": "red", "value": 500 }] } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 48, "title": "Python GC Collections Rate", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 93 },
          "targets": [{ "expr": "rate(python_gc_collections_total[5m])", "legendFormat": "gen{{generation}} {{instance}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 49, "title": "Process Start Times (uptime)", "type": "table",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 101 },
          "targets": [{ "expr": "process_start_time_seconds", "legendFormat": "{{instance}}", "refId": "A", "instant": true, "format": "table" }],
          "fieldConfig": { "defaults": { "unit": "dateTimeFromNow" }, "overrides": [] },
          "options": { "sortBy": [{ "displayName": "Value", "desc": false }], "footer": { "show": false } },
          "transformations": [{ "id": "organize", "options": {} }]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/etc/grafana/provisioning/dashboards/trading-devops/trading-services.json"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards/trading-devops
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 80
      targetPort: 3000
