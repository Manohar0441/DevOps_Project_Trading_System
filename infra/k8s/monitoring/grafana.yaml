          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "noValue": "0", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } } }
        },
        {
          "id": 29, "title": "Profit Lock Signals (total)", "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 45 },
          "targets": [{ "expr": "risk_profit_lock_signals_total", "legendFormat": "Signals", "refId": "A" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "noValue": "0", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 30, "title": "Macro Flags Raised (total)", "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 45 },
          "targets": [{ "expr": "risk_macro_flags_total", "legendFormat": "Flags", "refId": "A" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "noValue": "0", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 10 }] } } }
        },
        {
          "id": 31, "type": "row", "title": "Batch Processing",
          "collapsed": false, "panels": [],
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 49 }
        },
        {
          "id": 32, "title": "Batch Jobs by Status", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 50 },
          "targets": [{ "expr": "rate(batch_jobs_total[5m])", "legendFormat": "{{status}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 33, "title": "Batch Stocks Processed by Status", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 50 },
          "targets": [{ "expr": "rate(batch_stocks_processed_total[5m])", "legendFormat": "{{status}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 34, "title": "Batch Job Duration P95 (s)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 50 },
          "targets": [{ "expr": "histogram_quantile(0.95, rate(batch_job_duration_seconds_bucket[5m]))", "legendFormat": "P95", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 10 }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 30 }, { "color": "red", "value": 120 }] } } },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 35, "type": "row", "title": "Screening & Portfolio",
          "collapsed": false, "panels": [],
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 58 }
