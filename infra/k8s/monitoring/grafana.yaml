        },
        {
          "id": 40, "type": "row", "title": "Notifications & Messaging",
          "collapsed": false, "panels": [],
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 75 }
        },
        {
          "id": 41, "title": "Notifications Dispatched by Channel", "type": "timeseries",
